<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room HUD</title>
<style>
  html, body { margin: 0; overflow: hidden; background: #000; height: 100%; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; color: #4df0ff; text-align: center;
    background: radial-gradient(circle at center, #001018 0%, #000 100%);
  }
  #overlay h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 8px; text-shadow: 0 0 12px #4df0ff; }
  #overlay p { font-size: 14px; color: #7fd8ff; max-width: 320px; line-height: 1.5; }
  #enterAR {
    margin-top: 24px; padding: 14px 36px; font-size: 16px; letter-spacing: 1px;
    background: rgba(77,240,255,0.08); border: 1px solid #4df0ff; color: #4df0ff;
    border-radius: 4px; cursor: pointer; font-family: inherit;
  }
  #enterAR:hover { background: rgba(77,240,255,0.2); }
  #unsupported { display: none; color: #ff6b6b; margin-top: 16px; font-size: 13px; max-width: 320px; }
</style>
</head>
<body>

<div id="overlay">
  <h1>◈ ROOM HUD ◈</h1>
  <p>Passthrough holographic interface. Put on your headset in the Quest Browser, then tap below to enter your room.</p>
  <button id="enterAR">ENTER AR</button>
  <div id="unsupported">WebXR AR isn't available in this browser. Open this page in the Meta Quest Browser on your headset.</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

let camera, scene, renderer;
let controller;
const panels = [];
const clock = new THREE.Clock();

init();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 40);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0); // transparent -> passthrough shows through
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x88ccff, 1.2));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(1, 2, 1);
  scene.add(dir);

  buildHUD();

  controller = renderer.xr.getController(0);
  scene.add(controller);
  const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)
  ]);
  const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0x4df0ff }));
  ray.scale.z = 3;
  controller.add(ray);

  const arButton = ARButton.createButton(renderer, {
    optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
  });
  arButton.style.display = 'none';
  document.body.appendChild(arButton);

  document.getElementById('enterAR').addEventListener('click', () => {
    if (arButton.disabled) {
      document.getElementById('unsupported').style.display = 'block';
    } else {
      arButton.click();
      document.getElementById('overlay').style.display = 'none';
    }
  });

  renderer.xr.addEventListener('sessionend', () => {
    document.getElementById('overlay').style.display = 'flex';
  });

  window.addEventListener('resize', onResize);
  renderer.setAnimationLoop(render);
}

function makeHoloPanelTexture(drawFn, w = 512, h = 320) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, w, h);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return { canvas, ctx, tex };
}

function panelBase(ctx, w, h, title) {
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(77,240,255,0.9)';
  ctx.lineWidth = 3;
  ctx.strokeRect(6, 6, w - 12, h - 12);
  ctx.fillStyle = 'rgba(0,30,40,0.35)';
  ctx.fillRect(6, 6, w - 12, h - 12);
  ctx.fillStyle = 'rgba(77,240,255,0.9)';
  ctx.font = 'bold 26px Courier New';
  ctx.fillText(title, 24, 44);
  ctx.strokeStyle = 'rgba(77,240,255,0.5)';
  ctx.beginPath(); ctx.moveTo(20, 56); ctx.lineTo(w - 20, 56); ctx.stroke();
}

function addPanel({ position, rotationY = 0, width = 0.6, height = 0.375, update, title }) {
  const { canvas, ctx, tex } = makeHoloPanelTexture((c, w, h) => panelBase(c, w, h, title));
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.92, side: THREE.DoubleSide });
  const geo = new THREE.PlaneGeometry(width, height);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);
  mesh.rotation.y = rotationY;
  scene.add(mesh);

  const glowMat = new THREE.MeshBasicMaterial({ color: 0x4df0ff, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(width * 1.06, height * 1.08), glowMat);
  glow.position.z = -0.002;
  mesh.add(glow);

  panels.push({ ctx, canvas, tex, title, update, mesh });
  return mesh;
}

function buildHUD() {
  addPanel({
    title: 'CHRONO',
    position: new THREE.Vector3(-0.5, 1.5, -1.0),
    rotationY: 0.35,
    width: 0.5, height: 0.32,
    update: (ctx, w, h) => {
      panelBase(ctx, w, h, 'CHRONO');
      const now = new Date();
      ctx.fillStyle = '#eafcff';
      ctx.font = 'bold 44px Courier New';
      ctx.fillText(now.toLocaleTimeString(), 24, 130);
      ctx.font = '20px Courier New';
      ctx.fillStyle = 'rgba(77,240,255,0.85)';
      ctx.fillText(now.toDateString(), 24, 170);
    }
  });

  addPanel({
    title: 'SYSTEM STATUS',
    position: new THREE.Vector3(0, 1.55, -1.15),
    width: 0.62, height: 0.38,
    update: (ctx, w, h) => {
      panelBase(ctx, w, h, 'SYSTEM STATUS');
      const lines = ['POWER CORE ......... ONLINE', 'PASSTHROUGH ........ ACTIVE', 'HAND TRACKING ...... READY', 'NETWORK ............ LINKED'];
      ctx.font = '18px Courier New';
      ctx.fillStyle = '#7fe8ff';
      lines.forEach((l, i) => ctx.fillText(l, 24, 100 + i * 32));
    }
  });

  addPanel({
    title: 'DIAG',
    position: new THREE.Vector3(0.55, 1.45, -1.0),
    rotationY: -0.4,
    width: 0.4, height: 0.3,
    update: (ctx, w, h) => {
      panelBase(ctx, w, h, 'DIAG');
      const t = performance.now() / 1000;
      const pulse = (Math.sin(t * 2) * 0.5 + 0.5) * 100;
      ctx.font = '18px Courier New';
      ctx.fillStyle = '#7fe8ff';
      ctx.fillText('FPS  ' + (1 / Math.max(0.001, clock.getDelta())).toFixed(0), 24, 90);
      ctx.fillText('SIG  ' + pulse.toFixed(0) + '%', 24, 120);
      ctx.strokeStyle = 'rgba(77,240,255,0.8)';
      ctx.strokeRect(24, 140, w - 48, 14);
      ctx.fillStyle = 'rgba(77,240,255,0.6)';
      ctx.fillRect(24, 140, (w - 48) * (pulse / 100), 14);
    }
  });

  const ringGeo = new THREE.RingGeometry(0.06, 0.075, 48);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x4df0ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(0, 1.55, -1.16);
  scene.add(ring);
  panels.push({ ring });
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function render() {
  const t = performance.now() / 1000;
  panels.forEach(p => {
    if (p.update) {
      p.update(p.ctx, p.canvas.width, p.canvas.height);
      p.tex.needsUpdate = true;
      p.mesh.position.y += Math.sin(t + p.mesh.position.x * 3) * 0.0002;
    }
    if (p.ring) {
      p.ring.rotation.z = t * 0.6;
    }
  });
  renderer.render(scene, camera);
}
</script>
</body>
</html>
